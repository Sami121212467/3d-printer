</div>

<button

Edit Journal Entry
</button>
</div>
) : (

value={stepsWalked[currentMission.id] || ''}

/>

<div className="space-y-1">
<label className="text-slate-400 font-mono text-[9px] uppercase">💶 Total Spent Today ({currentMission.id >= 6 && currentMission.id <= 10 ? 'CHF' : 'Euro'})</label>

placeholder="e.g. 285"

/>
</div>

<div className="space-y-1">
<label className="text-slate-400 font-mono text-[9px] uppercase">👑 Today's Hero</label>
<input

placeholder="Who saved the day or got the coolest photo?"
value={todaysHero[currentMission.id] || ''}
onChange={(e) => setTodaysHero({ ...todaysHero, [currentMission.id]: e.target.value })}

/>
</div>

<div className="space-y-1">
<label className="text-slate-400 font-mono text-[9px] uppercase">🍲 Best Meal / Gelato Flavor</label>

onChange={(e) => setBestMeal({ ...bestMeal, [currentMission.id]: e.target.value })}

/>
</div>

<div className="space-y-1">
<label className="text-slate-400 font-mono text-[9px] uppercase">😂 Funniest Moment</label>

className="w-full bg-slate-950 border border-slate-850 p-2.5 rounded-lg text-slate-100 focus:border-amber-500"
/>
</div>

<button
onClick={() => handleSaveLog(currentMission.id)}
className="w-full bg-amber-500 text-slate-950 hover:bg-amber-400 transition-colors py-2.5 rounded-lg font-black text-xs uppercase tracking-wider mt-2"

Save Journal Entry & Unlock Stamp
</button>
</div>
)}
</div>

<span className="font-extrabold text-amber-400">{currentMission.nextPreview}</span>
</div>

onClick={() => {

setActiveTab('missions');
}
}}
className="bg-slate-950 hover:bg-slate-850 border border-slate-800 p-2 rounded-lg text-slate-200 text-xs transition"

</button>
</div>

</div>

<button

<span className="text-[10px] font-mono">Transit</span>

<button

<span className="text-[10px] font-mono">Crew</span>

<button

<button
onClick={() => setIsWalletOpen(false)}

<X className="w-5 h-5" />
</button>
</div>

</div>
<div className="flex items-center gap-2">
<span className="text-[9px] font-mono bg-emerald-950 text-emerald-400 px-2 py-0.5 rounded border border-emerald-900/50">HK5 CONFIRMED</span>

{copiedPNR ? <Check className="w-3.5 h-3.5 text-emerald-500" /> : <Copy className="w-3.5 h-3.5" />}

</div>
</div>

<button

className={`py-2 text-center text-xs font-extrabold uppercase rounded-lg transition-all ${
activeFlightTab === 'outbound'
? 'bg-amber-500 text-slate-950 font-black shadow'
: 'text-slate-400 hover:text-slate-200'
}`}
>
Outbound: EK 49
</button>
<button
onClick={() => setActiveFlightTab('inbound')}
className={`py-2 text-center text-xs font-extrabold uppercase rounded-lg transition-all ${
activeFlightTab === 'inbound'
? 'bg-amber-500 text-slate-950 font-black shadow'
: 'text-slate-400 hover:text-slate-200'
}`}
>
Inbound: EK 46
</button>
</div>

{/* Passenger Selector */}
<div className="space-y-1.5">

<div className="flex gap-1.5 overflow-x-auto pb-1 scrollbar-none">
{passengers.map((p, idx) => (
<button

onClick={() => setSelectedPass(idx)}
className={`py-1.5 px-3 rounded-lg border text-xs font-extrabold tracking-tight shrink-0 transition-all ${

<span>{p.avatar} {p.name.split('/')[1]?.split(' ')[0] || p.name.split('/')[1]}</span>
</button>
))}
</div>
</div>

<div className="text-right">
<span className="text-[8px] uppercase font-mono block text-slate-900/60 leading-none">Class / Booking</span>

</div>
</div>

{activeFlightTab === 'outbound' ? 'DXB' : 'FRA'}

<span className="text-[9px] font-mono font-black tracking-wider uppercase text-slate-950/70 bg-white/20 px-2 py-0.5 rounded-full">
{activeFlightTab === 'outbound' ? 'EK 49' : 'EK 46'}
</span>
<div className="w-full border-b border-dashed border-slate-950/30 my-2 relative">
<span className="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 text-xs font-serif">✈️</span>

{activeFlightTab === 'outbound' ? 'MUC' : 'DXB'}
</h3>

{activeFlightTab === 'outbound' ? 'Munich Airport' : 'Dubai Terminal 3'}
</span>
</div>
</div>

<div className="grid grid-cols-3 gap-2 py-3 border-t border-b border-dashed border-slate-950/15 text-xs text-center font-mono">

</div>
</div>

<span className="text-[8px] uppercase text-slate-950/60 font-mono block">Seat Assign</span>

</span>

</div>

* YOVYLJ - EK MULTI - CONFIRMED HK5 *

</div>

</div>

<button
onClick={() => setIsWalletOpen(false)}

</div>

root.render(<App />);
